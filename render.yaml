services:
  - type: web
    name: ginger-hands-free
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn ginger_backend_v2:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: AGENT_SECRET_KEY
        sync: false
